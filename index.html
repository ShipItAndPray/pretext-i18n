<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NNV3CN8D2N"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pretext-i18n - Catch i18n Text Overflow at Build Time</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --orange: #d29922;
    --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

  header {
    text-align: center;
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }

  header h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; }
  header h1 span { color: var(--accent); }
  header p { color: var(--text-dim); font-size: 1.1rem; max-width: 600px; margin: 0 auto; }

  .badge-row { margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
  .badge {
    display: inline-block; padding: 0.25rem 0.75rem; border-radius: 999px;
    font-size: 0.75rem; font-weight: 600; border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .panel h2 { font-size: 1.1rem; margin-bottom: 1rem; color: var(--accent); }

  label { display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 0.25rem; }

  input[type="text"], input[type="number"], select {
    width: 100%; padding: 0.6rem 0.8rem; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 0.95rem; font-family: var(--font-sans);
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }

  .input-grid { display: grid; grid-template-columns: 1fr 140px 180px; gap: 1rem; align-items: end; }

  .mode-toggle {
    display: flex; gap: 0; margin-bottom: 1rem; border: 1px solid var(--border); border-radius: 6px;
    overflow: hidden; width: fit-content;
  }
  .mode-toggle button {
    padding: 0.5rem 1rem; background: var(--bg); border: none; color: var(--text-dim);
    cursor: pointer; font-size: 0.85rem; transition: all 0.2s;
  }
  .mode-toggle button.active { background: var(--accent); color: #fff; }

  .locale-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.75rem;
  }

  .locale-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem;
    transition: border-color 0.2s;
  }
  .locale-card.overflow { border-color: var(--red); }
  .locale-card.pass { border-color: var(--green); }

  .locale-card .locale-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;
  }
  .locale-card .locale-name { font-weight: 600; font-size: 0.9rem; }
  .locale-card .locale-status { font-size: 0.75rem; font-weight: 600; padding: 0.1rem 0.5rem; border-radius: 999px; }
  .locale-card .locale-status.pass { background: rgba(63,185,80,0.15); color: var(--green); }
  .locale-card .locale-status.fail { background: rgba(248,81,73,0.15); color: var(--red); }

  .text-preview {
    position: relative; overflow: hidden; border: 1px dashed var(--border);
    border-radius: 4px; padding: 0.4rem; margin-top: 0.4rem; font-size: 0.8rem;
    white-space: nowrap; color: var(--text-dim);
  }
  .text-preview .overflow-zone {
    color: var(--red); background: rgba(248,81,73,0.1);
  }

  .stats { display: flex; gap: 0.5rem; font-size: 0.8rem; color: var(--text-dim); margin-top: 0.3rem; }

  .terminal {
    background: #000; border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
    margin-top: 1.5rem;
  }
  .terminal-bar {
    background: #1a1a1a; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .terminal-dot { width: 10px; height: 10px; border-radius: 50%; }
  .terminal-dot.r { background: #ff5f57; }
  .terminal-dot.y { background: #febc2e; }
  .terminal-dot.g { background: #28c840; }
  .terminal-bar span { color: var(--text-dim); font-size: 0.8rem; margin-left: 0.5rem; font-family: var(--font-mono); }
  .terminal-body {
    padding: 1rem; font-family: var(--font-mono); font-size: 0.8rem; line-height: 1.5;
    white-space: pre; overflow-x: auto; color: #ccc; min-height: 120px;
  }

  .summary-bar {
    display: flex; gap: 2rem; padding: 1rem; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 1.5rem; justify-content: center;
  }
  .summary-item { text-align: center; }
  .summary-item .num { font-size: 1.8rem; font-weight: 700; }
  .summary-item .lbl { font-size: 0.8rem; color: var(--text-dim); }
  .summary-item .num.green { color: var(--green); }
  .summary-item .num.red { color: var(--red); }
  .summary-item .num.blue { color: var(--accent); }

  footer {
    text-align: center; padding: 2rem 0; color: var(--text-dim); font-size: 0.85rem;
    border-top: 1px solid var(--border); margin-top: 2rem;
  }
  footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 640px) {
    .input-grid { grid-template-columns: 1fr; }
    .locale-grid { grid-template-columns: 1fr; }
    .summary-bar { flex-wrap: wrap; gap: 1rem; }
    header h1 { font-size: 1.6rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><span>pretext-i18n</span></h1>
    <p>Catch i18n text overflow at build time. No browser needed.</p>
    <div class="badge-row">
      <span class="badge">Build-time</span>
      <span class="badge">11+ locales</span>
      <span class="badge">CI-ready</span>
      <span class="badge">Zero runtime</span>
    </div>
  </header>

  <div class="panel">
    <h2>Configure Check</h2>
    <div class="input-grid">
      <div>
        <label for="sourceText">English source text</label>
        <input type="text" id="sourceText" value="Save changes" placeholder="Enter English text...">
      </div>
      <div>
        <label for="containerWidth">Container (px)</label>
        <input type="number" id="containerWidth" value="120" min="10" max="2000">
      </div>
      <div>
        <label for="fontSize">Font</label>
        <input type="text" id="fontSize" value="14px Inter" placeholder="14px Inter">
      </div>
    </div>
  </div>

  <div class="mode-toggle">
    <button id="modeEstimate" class="active" onclick="setMode('estimate')">Estimated Expansion</button>
    <button id="modeActual" onclick="setMode('actual')">Actual Translations</button>
  </div>

  <div class="summary-bar">
    <div class="summary-item"><div class="num blue" id="totalCount">0</div><div class="lbl">Total</div></div>
    <div class="summary-item"><div class="num green" id="passCount">0</div><div class="lbl">Pass</div></div>
    <div class="summary-item"><div class="num red" id="failCount">0</div><div class="lbl">Overflow</div></div>
  </div>

  <div class="locale-grid" id="localeGrid"></div>

  <div class="terminal">
    <div class="terminal-bar">
      <div class="terminal-dot r"></div>
      <div class="terminal-dot y"></div>
      <div class="terminal-dot g"></div>
      <span>CI Output Preview</span>
    </div>
    <div class="terminal-body" id="terminalOutput"></div>
  </div>

  <footer>
    <p>
      <a href="https://github.com/ShipItAndPray/pretext-i18n">GitHub</a> ·
      <a href="https://www.npmjs.com/package/@shipitandpray/pretext-i18n">npm</a> ·
      Built by <a href="https://github.com/ShipItAndPray">ShipItAndPray</a>
    </p>
  </footer>
</div>

<script>
const EXPANSION = { de:1.35, fr:1.20, es:1.25, it:1.15, pt:1.30, ja:0.90, zh:0.80, ko:0.90, ar:1.25, ru:1.15, fi:1.30 };
const LOCALE_NAMES = { de:'German', fr:'French', es:'Spanish', it:'Italian', pt:'Portuguese', ja:'Japanese', zh:'Chinese', ko:'Korean', ar:'Arabic', ru:'Russian', fi:'Finnish' };

// Pre-loaded "Save changes" translations
const ACTUAL_TRANSLATIONS = {
  de: 'Anderungen speichern',
  fr: 'Enregistrer les modifications',
  es: 'Guardar cambios',
  it: 'Salva modifiche',
  pt: 'Salvar alteracoes',
  ja: '変更を保存',
  zh: '保存更改',
  ko: '변경 사항 저장',
  ar: 'حفظ التغييرات',
  ru: 'Сохранить изменения',
  fi: 'Tallenna muutokset',
};

let mode = 'estimate';

function setMode(m) {
  mode = m;
  document.getElementById('modeEstimate').classList.toggle('active', m === 'estimate');
  document.getElementById('modeActual').classList.toggle('active', m === 'actual');
  runCheck();
}

function estimateExpansion(text, locale) {
  const factor = EXPANSION[locale] || 1.0;
  const targetLen = Math.round(text.length * factor);
  if (targetLen <= text.length) return text.slice(0, targetLen);
  let r = text;
  while (r.length < targetLen) r += text.slice(0, targetLen - r.length);
  return r;
}

function measureWidth(text, font) {
  const m = font.match(/(\d+(?:\.\d+)?)\s*px/);
  const size = m ? parseFloat(m[1]) : 16;
  return text.length * size * 0.6;
}

function runCheck() {
  const text = document.getElementById('sourceText').value || 'Save changes';
  const containerWidth = parseInt(document.getElementById('containerWidth').value) || 120;
  const font = document.getElementById('fontSize').value || '14px Inter';

  const grid = document.getElementById('localeGrid');
  grid.innerHTML = '';

  let passCount = 0, failCount = 0;
  const results = [];

  for (const [locale, factor] of Object.entries(EXPANSION)) {
    const localizedText = mode === 'actual' && ACTUAL_TRANSLATIONS[locale]
      ? ACTUAL_TRANSLATIONS[locale]
      : estimateExpansion(text, locale);

    const textWidth = measureWidth(localizedText, font);
    const overflow = textWidth - containerWidth;
    const isOverflow = overflow > 0;

    if (isOverflow) failCount++; else passCount++;

    results.push({ locale, name: LOCALE_NAMES[locale], localizedText, textWidth: Math.round(textWidth * 10) / 10, overflow: Math.round(overflow * 10) / 10, isOverflow });

    const card = document.createElement('div');
    card.className = 'locale-card ' + (isOverflow ? 'overflow' : 'pass');

    const pct = ((factor - 1) * 100);
    const pctStr = pct >= 0 ? '+' + pct.toFixed(0) + '%' : pct.toFixed(0) + '%';

    card.innerHTML = `
      <div class="locale-header">
        <span class="locale-name">${LOCALE_NAMES[locale]} (${locale}) ${pctStr}</span>
        <span class="locale-status ${isOverflow ? 'fail' : 'pass'}">${isOverflow ? 'OVERFLOW' : 'PASS'}</span>
      </div>
      <div class="text-preview" style="width:${containerWidth}px; max-width:100%; font:${font};">` +
        (isOverflow
          ? escapeHtml(localizedText.slice(0, Math.floor(localizedText.length * (containerWidth / textWidth)))) +
            '<span class="overflow-zone">' + escapeHtml(localizedText.slice(Math.floor(localizedText.length * (containerWidth / textWidth)))) + '</span>'
          : escapeHtml(localizedText)) +
      `</div>
      <div class="stats">
        <span>Width: ${Math.round(textWidth)}px</span>
        <span>${isOverflow ? 'Overflow: +' + Math.round(overflow) + 'px' : 'Fits'}</span>
      </div>
    `;
    grid.appendChild(card);
  }

  const total = passCount + failCount;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('passCount').textContent = passCount;
  document.getElementById('failCount').textContent = failCount;

  // Terminal output
  let term = '  pretext-i18n Overflow Report\n  ==================================================\n\n';
  term += '  [' + (failCount > 0 ? 'x' : 'v') + '] demo-component\n';
  if (failCount > 0) {
    term += '      Locale     Width      Overflow   Lines\n';
    term += '      ---------- ---------- ---------- -----\n';
    for (const r of results.filter(r => r.isOverflow)) {
      term += '      ' + r.locale.padEnd(10) + ' ' + String(r.textWidth).padEnd(10) + ' ' + ('+' + r.overflow).padEnd(10) + ' ' + Math.ceil(r.textWidth / containerWidth) + '\n';
    }
  } else {
    term += '      All ' + total + ' locales pass\n';
  }
  term += '\n  --------------------------------------------------\n';
  term += '  Total: 1 | Pass: ' + (failCount === 0 ? 1 : 0) + ' | Fail: ' + (failCount > 0 ? 1 : 0) + '\n';

  document.getElementById('terminalOutput').textContent = term;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Live updates
document.getElementById('sourceText').addEventListener('input', runCheck);
document.getElementById('containerWidth').addEventListener('input', runCheck);
document.getElementById('fontSize').addEventListener('input', runCheck);

// Initial run
runCheck();
</script>
</body>
</html>
